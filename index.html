<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro E-Commerce</title>

<style>
/* ================= BODY ================= */
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

/* ================= CONTAINER ================= */
.container{
  max-width:1000px;
  margin:auto;
  padding:10px;
}

/* ================= INPUT ================= */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

/* ================= BUTTON ================= */
button{
  padding:10px;
  border:none;
  border-radius:5px;
  background:#28a745;
  color:#fff;
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

/* ================= HIDE ================= */
.hidden{
  display:none;
}

/* ================= NAVBAR ================= */
.nav{
  background:#222;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.nav span{
  font-size:18px;
  font-weight:bold;
}

.nav button{
  width:auto;
  padding:6px 10px;
  margin:3px;
  font-size:12px;
}

/* ================= PRODUCTS GRID ================= */
#products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:10px;
}

/* ================= PRODUCT CARD ================= */
.product{
  background:#fff;
  padding:5px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  transition:0.3s;
}

.product:hover{
  transform:translateY(-5px);
}

/* ================= PRODUCT IMAGE ================= */
.product img{
  width:100%;
  height:190px;
  object-fit:cover;
  border-radius:8px;
}

/* ================= PRODUCT TEXT ================= */
.product span{
  display:block;
  line-height:0.01;

}

.product button{
  background:#ff5722;
  width:50px;
  margin-top:2px;
}

/* ================= CARD ================= */
.card{
  background:#fff;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
}

/* ================= CART BOX ================= */
#cartBox{
  position:fixed;
  top:0;
  right:0;
  width:300px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  padding:15px;
  overflow:auto;
  z-index:1000;
}

/* ================= ADMIN PANEL ================= */
#adminPanel{
  max-height:90vh;
  overflow:auto;
}

/* ================= MESSAGE BOX ================= */
#msgBox{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}

/* ================= MOBILE ================= */
@media(max-width:500px){

  .nav{
    flex-direction:column;
    align-items:flex-start;
  }

  .nav button{
    font-size:11px;
    padding:5px 8px;
  }

  #cartBox{
    width:100%;
  }
}
</style>

</head>
<body>

<div id="msgBox"></div>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="showReg()">Register</button>
</div>

<!-- REGISTER -->
<div id="regBox" class="container hidden">
<h3>Register</h3>
<input id="rName" placeholder="Name">
<input id="rEmail" placeholder="Email">
<input id="rPass" type="password" placeholder="Password">
<button onclick="register()">Create</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">

<div class="nav">
<span>Shop</span>
<div>
<button style="width:70px;" onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
<button style="width:70px;" onclick="openProfile()">Profile</button>
<button style="width:70px;" onclick="openAdmin()">Admin</button>
<button style="width:70px;" onclick="logout()">Logout</button>
</div>
</div>


</div>


<!-- CART -->
<div id="cartBox" class="container hidden">
<h3>Checkout</h3>
<div id="cartList"></div>

<input id="cName" placeholder="Name">
<input id="cMobile" placeholder="Mobile">
<input id="cVillage" placeholder="Village">
<input id="cPost" placeholder="Post Office">
<input id="cPolice" placeholder="Police Station">
<input id="cDistrict" placeholder="District">
<input id="cPin" placeholder="PIN Code">

<button onclick="placeOrder()">Confirm Order</button>
<button onclick="closeCart()">Close</button>
</div>

<!-- PROFILE -->
<div id="profileBox" class="container hidden">
<h3>My Orders</h3>
<div id="orders"></div>
<button onclick="closeProfile()">Close</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminBox" class="container hidden">
<h3>Admin</h3>
<input id="adminPass" type="password">
<button onclick="checkAdmin()">Enter</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container hidden">

<h3>Add Product</h3>
<input id="pName" placeholder="Product Name">
<input id="pPrice" placeholder="Price">
<input type="file" id="pImg">
<button onclick="addProduct()">Add Product</button>

<hr>

<h3>Orders</h3>
<div id="adminOrders"></div>

<button onclick="closeAdmin()">Close</button>
</div>

<div class="container">
<h3>Products</h3>
<div id="products"></div>
</div>

<script src="script.js">


</script>

</body>
</html>
