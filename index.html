<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cast Certificate Search</title>

<style>
body {
    font-family: Arial;
    text-align:center;
    padding:20px;
    background: linear-gradient(120deg, #e0eafc, #cfdef3);
}

h2 {
    color:#333;
    margin-bottom:20px;
}

select, input {
    padding:12px;
    margin:10px;
    width:260px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

#result {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:20px;
}

.card {
    background:white;
    padding:15px;
    margin:10px;
    width:260px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    text-align:left;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.noData {
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Cast Certificate Search</h2>

<select id="month">
    <option value="">All Months</option>
    <option value="January">January</option>
    <option value="February">February</option>
    <option value="March">March</option>
</select>

<br>

<input type="text" id="search" placeholder="Type Name or Certificate No...">

<div id="result"></div>

<script src="main.js"></script>

</body>
</html>
